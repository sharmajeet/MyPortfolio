# Full stack in one command:  docker compose up --build
# Provide secrets via a root .env or the shell, e.g.:
#   JWT_SECRET=... ADMIN_EMAIL=... ADMIN_PASSWORD=... docker compose up --build
# Then open http://localhost:4000

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/portfolio
      # Frontend and API share this origin, so CORS is a non-issue here.
      CORS_ORIGIN: http://localhost:4000
      TRUST_PROXY: "1"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (min 16 chars)}
      JWT_EXPIRES_IN: "604800"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

volumes:
  mongo-data:
